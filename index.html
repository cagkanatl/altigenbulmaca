<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Altıgen Bulmaca Asistanı</title>
  <style>
    :root{
      --bg:#0f1115; --panel:#171a21; --panel2:#1f2430; --text:#e7eaf1;
      --muted:#aab2c5; --stroke:#2e3445; --btn:#2a3347; --btnHover:#343f58; --accent:#76b7ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family: system-ui, -apple-system, sans-serif;
      background:linear-gradient(180deg,#0c0f14 0%, #0f1115 50%, #0c0f14 100%);
      color:var(--text); display:flex; justify-content:center; padding:18px;
    }
    .wrap{ width:min(980px, 100%); display:flex; flex-direction:column; gap:14px; }
    .card{ background:var(--panel); border:1px solid var(--stroke); border-radius:16px; padding:14px; box-shadow:0 10px 30px rgba(0,0,0,.35); }
    .title{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:8px; }
    .title h1{ font-size:18px; margin:0; font-weight:650; }
    .boardWrap{ width:100%; overflow:auto; border-radius:14px; background:radial-gradient(1200px 420px at 50% 0%, #20263a 0%, #111522 55%, #0b0e15 100%); border:1px solid var(--stroke); padding:10px; }
    svg{display:block; width:100%; height:auto;}
    .controls{ display:grid; grid-template-columns: 1fr auto auto; gap:10px; align-items:center; }
    .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    label{ font-size:12px; color:var(--muted); }
    input[type="range"]{ width:min(300px, 100%); accent-color:var(--accent); }
    button{ padding:10px 12px; border-radius:12px; border:1px solid var(--stroke); background:var(--btn); color:var(--text); cursor:pointer; font-weight:650; }
    button:hover{ background:var(--btnHover); }
    .legend{ display:grid; grid-template-columns: repeat(6, 1fr); gap:10px; margin-top:10px; }
    @media (max-width: 720px){ .controls{ grid-template-columns: 1fr; } .legend{ grid-template-columns: repeat(3, 1fr); } }
    .pieceCard{ background:var(--panel2); border:1px solid var(--stroke); border-radius:12px; padding:8px; display:flex; align-items:center; gap:8px; font-size:12px; }
    .dot{ width:12px; height:12px; border-radius:50%; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">
        <h1>Altıgen Bulmaca Asistanı</h1>
        <div class="hint">Parça Renkleri Sizin Setinize Göre Ayarlandı</div>
      </div>
      <div class="boardWrap">
        <svg id="boardSvg" viewBox="0 0 500 220" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
    </div>

    <div class="card">
      <div class="controls">
        <div class="left">
          <div class="row">
            <label>Eksik Parça Sayısı:</label>
            <input id="missingRange" type="range" min="1" max="12" value="6"/>
          </div>
          <div id="statusText" style="font-size:12px; color:var(--muted); margin-top:5px;">Durum: Hazır</div>
        </div>
        <button id="genBtn">Yeni Bulmaca</button>
        <button id="revealBtn" disabled>Cevabı Göster</button>
      </div>
    </div>

    <div class="card">
      <div class="legend" id="legend"></div>
    </div>
  </div>

<script>
(() => {
  const PIECES = {
    A: "#dfcca5", B: "#ff6600", C: "#793b20", D: "#cc0000", E: "#ffffff",
    F: "#2ec0ff", G: "#078827", H: "#ffdd00", I: "#ffdd00", J: "#737373",
    K: "#cc0000", L: "#078827"
  };

  const boardSvg = document.getElementById("boardSvg");
  const legend = document.getElementById("legend");
  
  // Lejant oluştur
  Object.entries(PIECES).forEach(([id, color]) => {
    legend.innerHTML += `<div class="pieceCard"><div class="dot" style="background:${color}"></div><span>Parça ${id}</span></div>`;
  });

  // Basit Altıgen Çizici
  function drawHex(cx, cy, size, fill) {
    let pts = [];
    for (let i = 0; i < 6; i++) {
      let angle = (60 * i - 30) * Math.PI / 180;
      pts.push(`${cx + size * Math.cos(angle)},${cy + size * Math.sin(angle)}`);
    }
    const hex = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
    hex.setAttribute("points", pts.join(" "));
    hex.setAttribute("fill", fill);
    hex.setAttribute("stroke", "rgba(255,255,255,0.1)");
    return hex;
  }

  // Tahtayı oluştur
  for(let r=0; r<5; r++) {
    for(let q=0; q<11; q++) {
      const x = 50 + q * 40 + (r % 2) * 20;
      const y = 40 + r * 35;
      boardSvg.appendChild(drawHex(x, y, 20, "rgba(255,255,255,0.05)"));
    }
  }

  document.getElementById("genBtn").addEventListener("click", () => {
    alert("Bulmaca üretme algoritması çalışıyor...");
    document.getElementById("revealBtn").disabled = false;
  });
})();
</script>
</body>
</html>
