<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Altıgen Bulmaca Asistanı</title>
  <style>
    :root{
      --bg:#0f1115; --panel:#171a21; --panel2:#1f2430; --text:#e7eaf1;
      --muted:#aab2c5; --stroke:#2e3445; --btn:#2a3347; --btnHover:#343f58; --accent:#76b7ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family: system-ui, -apple-system, sans-serif;
      background:linear-gradient(180deg,#0c0f14 0%, #0f1115 50%, #0c0f14 100%);
      color:var(--text); display:flex; justify-content:center; padding:18px;
    }
    .wrap{ width:min(980px, 100%); display:flex; flex-direction:column; gap:14px; }
    .card{ background:var(--panel); border:1px solid var(--stroke); border-radius:16px; padding:14px; box-shadow:0 10px 30px rgba(0,0,0,.35); }
    .title{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:8px; }
    .title h1{ font-size:18px; margin:0; font-weight:650; }
    .title .hint{ font-size:12px; color:var(--muted); }
    .boardWrap{ width:100%; overflow:auto; border-radius:14px; background:radial-gradient(1200px 420px at 50% 0%, #20263a 0%, #111522 55%, #0b0e15 100%); border:1px solid var(--stroke); padding:10px; }
    svg{display:block; width:100%; height:auto;}
    .controls{ display:grid; grid-template-columns: 1fr auto auto; gap:10px; align-items:center; }
    .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    label{ font-size:12px; color:var(--muted); }
    input[type="range"]{ width:min(300px, 100%); accent-color:var(--accent); }
    button{ padding:10px 12px; border-radius:12px; border:1px solid var(--stroke); background:var(--btn); color:var(--text); cursor:pointer; font-weight:650; }
    button:hover{ background:var(--btnHover); }
    .status{ margin-top:10px; font-size:12px; color:var(--muted); display:flex; gap:10px; align-items:center; }
    .pill{ padding:4px 8px; border-radius:999px; border:1px solid var(--stroke); background:rgba(255,255,255,.03); }
    .legend{ display:grid; grid-template-columns: repeat(6, 1fr); gap:10px; margin-top:10px; }
    @media (max-width: 720px){ .controls{ grid-template-columns: 1fr; } .legend{ grid-template-columns: repeat(3, 1fr); } }
    .pieceCard{ background:var(--panel2); border:1px solid var(--stroke); border-radius:12px; padding:8px; display:flex; align-items:center; gap:8px; }
    .miniHex{ width:24px; height:24px; border-radius:4px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">
        <h1>Altıgen Bulmaca Asistanı</h1>
        <div class="hint">Tahta: 56 Hücre • Parçalar: A–L</div>
      </div>
      <div class="boardWrap">
        <svg id="boardSvg" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
    </div>

    <div class="card">
      <div class="controls">
        <div class="left">
          <div class="row">
            <label>Eksik Parça:</label>
            <input id="missingRange" type="range" min="1" max="12" value="6"/>
            <span id="rangeVal">6</span>
          </div>
          <div class="row">
            <label class="checkLabel"><input id="missingAdjacent" type="checkbox" /> Yan yana eksik (kompakt)</label>
          </div>
          <div class="status">
            <span class="pill">Durum: <span id="statusText">Hazır</span></span>
            <span class="pill">Gizlenen: <span id="hiddenList">—</span></span>
          </div>
        </div>
        <button id="genBtn">Bulmaca Üret</button>
        <button id="revealBtn" disabled>Cevabı Göster</button>
      </div>
    </div>

    <div class="card">
      <div class="title"><h1>Renk Paleti</h1></div>
      <div class="legend" id="legend"></div>
    </div>
  </div>

<script>
(() => {
  const PIECES = {
    A: { color: "#dfcca5", coords: [[0,2],[1,2],[2,1],[3,0],[3,1]] },
    B: { color: "#ff6600", coords: [[0,1],[1,1],[2,0],[2,1],[3,0]] },
    C: { color: "#793b20", coords: [[0,2],[1,2],[2,2],[3,1],[4,0]] },
    D: { color: "#cc0000", coords: [[0,1],[1,1],[2,1],[3,0],[3,1]] },
    E: { color: "#ffffff", coords: [[0,1],[1,0],[1,1],[2,0],[2,1]] },
    F: { color: "#2ec0ff", coords: [[0,1],[1,1],[2,0],[2,1],[3,1]] },
    G: { color: "#078827", coords: [[0,1],[1,0],[1,1],[2,1],[3,0]] },
    H: { color: "#ffdd00", coords: [[0,2],[1,1],[1,2],[2,0],[2,2]] },
    I: { color: "#ffdd00", coords: [[0,1],[1,1],[2,1],[3,0]] },      
    J: { color: "#737373", coords: [[0,0],[1,0],[1,1],[2,1]] },      
    K: { color: "#cc0000", coords: [[0,1],[1,0],[1,1],[2,0]] },      
    L: { color: "#078827", coords: [[0,1],[1,1],[2,0],[2,1]] },      
  };

  const SIZE = 22;
  const SQRT3 = Math.sqrt(3);
  const boardSvg = document.getElementById("boardSvg");
  const legend = document.getElementById("legend");
  
  function getHexPoints(cx, cy, size) {
    let pts = [];
    for (let i = 0; i < 6; i++) {
      let angle = (60 * i - 30) * Math.PI / 180;
      pts.push(`${cx + size * Math.cos(angle)},${cy + size * Math.sin(angle)}`);
    }
    return pts.join(" ");
  }

  // Legend oluşturma
  Object.keys(PIECES).forEach(id => {
    const div = document.createElement("div");
    div.className = "pieceCard";
    div.innerHTML = `<div class="miniHex" style="background:${PIECES[id].color}"></div><span>Parça ${id}</span>`;
    legend.appendChild(div);
  });

  // Basit Tahta Çizimi (Placeholder için)
  boardSvg.setAttribute("viewBox", "0 0 500 200");
  for(let r=0; r<5; r++) {
    for(let q=0; q<11; q++) {
      const x = 50 + q * SIZE * SQRT3 + (r % 2) * (SIZE * SQRT3 / 2);
      const y = 40 + r * SIZE * 1.5;
      const hex = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
      hex.setAttribute("points", getHexPoints(x, y, SIZE * 0.95));
      hex.setAttribute("fill", "rgba(255,255,255,0.05)");
      hex.setAttribute("stroke", "rgba(255,255,255,0.1)");
      boardSvg.appendChild(hex);
    }
  }

  document.getElementById("genBtn").addEventListener("click", () => {
    document.getElementById("statusText").textContent = "Lütfen GitHub üzerinden kodun tamamını güncelleyin...";
    alert("GitHub'daki index.html dosyasını tamamen güncellediğinizde tüm özellikler aktif olacaktır!");
  });
})();
</script>
</body>
</html>
